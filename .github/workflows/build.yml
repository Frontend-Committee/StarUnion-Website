name: build and push
on:
  push:
    branches: [ "main" ]
    tags: 
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: login to docker
      uses: docker/login-action@v3
      with:
        registry: dhi.io
        username: ${{ secrets.docker_username }}
        password: ${{ secrets.docker_password }}


    - name: Build Docker Image
      run: |
          docker build -f Dockerfile.prod -t ${{ secrets.docker_username }}/starunionfrontend:${GITHUB_REF#refs/tags/} .
          docker build -f Dockerfile.prod -t ${{ secrets.docker_username }}/starunionfrontend:latest .

    - name: Login to Docker registry
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.docker_username }}
        password: ${{ secrets.docker_password }}


    - name: Push Docker Image
      run: |
          docker push ${{ secrets.docker_username }}/starunionfrontend:${GITHUB_REF#refs/tags/}
          docker push ${{ secrets.docker_username }}/starunionfrontend:latest
